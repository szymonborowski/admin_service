x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  admin-app:
    build:
      context: .
      dockerfile: docker/dev/php/Dockerfile
      target: php-runtime
      args:
        UID: ${UID}
        GID: ${GID}
    command: php-fpm
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      DB_HOST: admin-db
      DB_CONNECTION: ${DB_CONNECTION}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      USERS_API_URL_INTERNAL: ${USERS_API_URL_INTERNAL}
      USERS_SERVICE_API_KEY: ${USERS_SERVICE_API_KEY}
      SSO_URL: ${SSO_URL}
      SSO_INTERNAL_URL: ${SSO_INTERNAL_URL}
      SSO_CLIENT_ID: ${SSO_CLIENT_ID}
      SSO_CLIENT_SECRET: ${SSO_CLIENT_SECRET}
      SSO_REDIRECT_URI: ${SSO_REDIRECT_URI}
    volumes:
      - ./src:/var/www/html
    depends_on:
      admin-db:
        condition: service_healthy
    expose:
      - "9000"
    networks:
      - admin-internal
      - microservices
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'

  admin-nginx:
    image: nginx:1.27
    volumes:
      - ./src:/var/www/html
      - ./docker/dev/nginx/default.conf:/etc/nginx/conf.d/default.conf
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls=true"
      - "traefik.http.services.admin.loadbalancer.server.port=80"
    depends_on:
      admin-app:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/80'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - admin-internal
      - web
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.25'

  admin-db:
    image: mysql:8
    ports:
      - "127.0.0.1:3309:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - admin_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - admin-internal
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.50'

networks:
  admin-internal:
    driver: bridge
  web:
    external: true
  microservices:
    external: true

volumes:
  admin_db_data:
